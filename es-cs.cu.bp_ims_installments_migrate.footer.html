<!DOCTYPE html>
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<style>

@font-face {
	font-family: 'Roboto';
	font-weight: 400;
	font-style: normal;
	src: url(file:////Users/juris.kristaps.surums/Documents/mdtohtml/cs.ext.md_bundle/css/fonts/Roboto-Regular.ttf);
}

* {
	margin: 0;
	padding: 0;
}

body {
	padding: 0 14px;
	font-family: 'Roboto';
	font-size: 16px;
}

table {
	width: 100%;
}

td {
	padding: 2px 0px;
}

hr {
	border: 0;
	height: 0;
	border-top: 1px solid #2a2a2a;
}

.copyright, .filenames {
	font-size: 12px;
	color: #7b7b7b;
}

.copyright {
	width: 40mm;
}

.filenames, .pageindex {
	padding: 0mm 5mm;
}

.logotieto {
	text-align: right;
}

.logotieto img {
	width: 45mm;
}

</style>
<script>
	function subst() {
		var vars={};
		var x=window.location.search.substring(1).split('&');
		for (var i in x) {var z=x[i].split('=',2);vars[z[0]] = unescape(z[1]);}
		var x=['frompage','topage','page','webpage','section','subsection','subsubsection'];
		for (var i in x) {
			var y = document.getElementsByClassName(x[i]);
			for (var j=0; j<y.length; ++j) y[j].textContent = vars[x[i]];
		}
		var y = document.getElementById("year");
		var mydate=new Date();
		var year=mydate.getYear();
		if (year < 1000) year+=1900;
		var txt = document.createTextNode("© " + year + " TietoEVRY");
		y.innerText = txt.textContent;
	}
</script>
</head>
<body onload="subst()">
<table cellpadding="0" cellspacing="0">
	<tr>
		<td>
			<hr />
		</td>
		<td class="pageindex">page <span class="page"></span> / <span class="topage"></span></td>
		<td rowspan="2" class="logotieto"><img src="file:////Users/juris.kristaps.surums/Documents/mdtohtml/cs.ext.md_bundle/tieto_templates/tieto_logo_blue.svg" alt="Tieto Logo" /></td>
	</tr>
	<tr>
		<td class="copyright"><span id="year"></span></td>
		<td class="filenames">es-cs.cu.bp_ims_installments_migrate.pdf </td>
	</tr>
</table>
</body>
</html>
